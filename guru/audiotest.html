<div class="player">

<img src="../assets/images/matematika.jpg">

<h2>Mengenal Angka 1-20</h2>

<p>Matematika • Fase A</p>

<div class="controls">

<button onclick="playText()">

<i class="fa-solid fa-play"></i>

</button>

<button onclick="pauseText()">

<i class="fa-solid fa-pause"></i>

</button>

<button onclick="resumeText()">

<i class="fa-solid fa-forward-step"></i>

</button>

<button onclick="stopText()">

<i class="fa-solid fa-stop"></i>

</button>

</div>

<div class="speed">

<label>Kecepatan</label>

<select onchange="speed(this.value)">

<option value="0.5">0.5x</option>

<option value="1" selected>1x</option>

<option value="1.5">1.5x</option>

<option value="2">2x</option>

</select>

</div>

</div>

</div>
